<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>資格試験対策クイズ</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .question { font-weight: bold; margin-bottom: 20px; font-size: 1.1em; }
        .option { 
            display: block; width: 100%; padding: 15px; margin-bottom: 10px;
            border: 1px solid #ddd; border-radius: 8px; text-align: left;
            background: white; cursor: pointer; font-size: 1em;
        }
        .option:active { background: #e0e0e0; }
        #result { margin-top: 20px; font-weight: bold; text-align: center; font-size: 1.2em; }
        .next-btn { 
            display: none; width: 100%; padding: 15px; background: #007aff; 
            color: white; border: none; border-radius: 8px; margin-top: 20px; 
        }
    </style>
</head>
<body>

<div class="card">
    <div id="q-number">第1問</div>
    <div class="question" id="question-text">問題文がここに表示されます</div>
    <div id="options-container">
        </div>
    <div id="result"></div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">次の問題へ</button>
</div>

<script>
    // --- ここに問題を好きなだけ追加できます ---
    const quizData = [
        {
            q: "次のうち、燃焼の三要素に含まれないものはどれか？",
            a: ["可燃物", "酸素供給体", "点火源", "触媒", "連鎖反応"],
            correct: 3 // 0から数えるので、4番目の「触媒」が正解
        },
         {
            q: "危険物の性状として妥当なものはどれか？",
            a: ["常温で引火するものは必ず危険物である", "すべての危険物には引火点がある", "危険物は必ず燃焼する", "すべての危険物は分子内に炭素、酸素、水素のいずれかを含有している", "常温で液体または固体である"],
            correct: 4
         },
        
        {
            q: "潜水業務において、特別教育が必要なのは次のうちどれか？",
            a: ["選択肢1", "選択肢2", "選択肢3", "選択肢4", "選択肢5"],
            correct: 0
        }
         {
            q: "危険物の性状として妥当なものはどれか？",
            a: ["常温で引火するものは必ず危険物である", "すべての危険物には引火点がある", "危険物は必ず燃焼する", "すべての危険物は分子内に炭素、酸素、水素のいずれかを含有している", "常温で液体または固体である"],
            correct: 4
         },
    ];

    let currentIdx = 0;

    function loadQuestion() {
        const data = quizData[currentIdx];
        document.getElementById('q-number').innerText = `第${currentIdx + 1}問`;
        document.getElementById('question-text').innerText = data.q;
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        document.getElementById('result').innerText = '';
        document.getElementById('next-btn').style.display = 'none';

        data.a.forEach((text, i) => {
            const btn = document.createElement('button');
            btn.className = 'option';
            btn.innerText = `${i + 1}. ${text}`;
            btn.onclick = () => checkAnswer(i);
            container.appendChild(btn);
        });
    }

    function checkAnswer(choice) {
        const correct = quizData[currentIdx].correct;
        const resDiv = document.getElementById('result');
        if (choice === correct) {
            resDiv.innerText = "⭕ 正解！";
            resDiv.style.color = "green";
        } else {
            resDiv.innerText = `❌ 不正解... (正解は ${correct + 1})`;
            resDiv.style.color = "red";
        }
        document.getElementById('next-btn').style.display = 'block';
    }

    function nextQuestion() {
        currentIdx = (currentIdx + 1) % quizData.length;
        loadQuestion();
    }

    loadQuestion();
</script>
</body>

</html>
