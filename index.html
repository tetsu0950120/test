            a: ["A.○、B.×、C.×、D.○", "A.×、B.○、C.×、D.○", "A.○、B.×、C.○、D.○", "A.×、B.×、C.○、D.○", "A.○、B.○、C.○、D.×"],
         },
 {
            q: "五フッ化臭素の貯蔵容器の材質として妥当なものは次のうちどれか",
            a: ["ポリエチレン", "アルミニウム", "鉄", "ガラス", "陶器"],
         },
 {
            q: "五フッ化臭素の貯蔵容器の材質として次のA～Dのうち妥当なもののみを全て掲げているのはどれか\n\nA.ガラス\nB.ポリエチレン\nC.アルミニウム\nD.陶器",
            a: ["B", "A", "A、C", "A、D", "B、D"],
         },
 {
            q: "五フッ化臭素の貯蔵、取扱いに関する次のA～Dについて正誤の組合せが妥当なものはどれか\n\nA.直射日光を避け、冷暗所に貯蔵する\nB.金属容器を避け、ガラス容器で貯蔵する\nC.危険性を低減するため、ヘキサンやベンゼン等で希釈して貯蔵する\nD.木材、紙等との接触を避ける",

 {
            q: "五フッ化臭素の貯蔵、取扱いに関する次のA～Dについて正誤の組合せが妥当なものはどれか\n\nA.金属容器を避け、ガラス容器で貯蔵する\nB.冷暗所で貯蔵する\nC.空気に触れないように水中で貯蔵する\nD.発生した蒸気は吸引しないようにする",
            a: ["A.×、B.○、C.×、D.○", "A.×、B.○、C.○、D.×", "A.○、B.○、C.×、D.○", "A.○、B.×、C.○、D.×", "A.×、B.×、C.○、D.○"],
         }
    ];

    let quizSet = [];
    let currentIdx = 0;
    let isAnswered = false;
    let correctAnswersTotal = 0;

    const shuffle = (array) => {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    };

    function initQuiz() {
        quizSet = shuffle([...rawData]);
        currentIdx = 0;
        correctAnswersTotal = 0;
        document.getElementById('quiz-screen').style.display = 'block';
        document.getElementById('result-screen').style.display = 'none';
        loadQuestion();
    }

    function loadQuestion() {
        isAnswered = false;
        const data = quizSet[currentIdx];
        document.getElementById('q-number').innerText = `問題 ${currentIdx + 1} / ${quizSet.length}`;
        document.getElementById('question-text').innerText = data.q;
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        document.getElementById('result-text').innerText = '';
        document.getElementById('next-btn').style.display = 'none';

        const correctAnswerText = data.a[0];
        const shuffledOptions = shuffle([...data.a]);

        shuffledOptions.forEach((text) => {
            const btn = document.createElement('button');
            btn.className = 'option';
            btn.innerText = text;
            btn.onclick = () => checkAnswer(btn, text, correctAnswerText);
            container.appendChild(btn);
        });
    }

    function checkAnswer(selectedBtn, selectedText, correctText) {
        if (isAnswered) return;
        isAnswered = true;

        const allButtons = document.querySelectorAll('.option');
        const resDiv = document.getElementById('result-text');

        allButtons.forEach(btn => {
            if (btn.innerText === correctText) {
                btn.classList.add('correct-ans');
            }
        });

        if (selectedText === correctText) {
            correctAnswersTotal++;
            resDiv.innerText = "⭕ 正解！";
            resDiv.style.color = "#2e7d32";
        } else {
            selectedBtn.classList.add('wrong-ans');
            resDiv.innerText = "❌ 不正解";
            resDiv.style.color = "#c62828";
        }
        
        document.getElementById('next-btn').style.display = 'block';
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < quizSet.length) {
            loadQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        const rate = Math.round((correctAnswersTotal / quizSet.length) * 100);
        document.getElementById('total-q').innerText = quizSet.length;
        document.getElementById('correct-count').innerText = correctAnswersTotal;
        document.getElementById('correct-rate').innerText = rate;
    }

    initQuiz();
</script>
</body>
</html>
